name: release-ci

# Post-merge validation gate. Runs on push to protected branches
# (main, develop) and as the canonical scheduled run. Always uses the
# FULL pytest matrix — no conditional skipping — so the protected-branch
# history is exercised on every supported Python.
#
# L1 concurrency — coalesce overlapping pushes on the same branch.
# L5 uv with cache-by-pyproject.toml.

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tests:
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv pip install --system -e ".[all,dev]" || uv pip install --system -e ".[dev]" || uv pip install --system -e .
      - name: Run tests
        run: pytest tests/ --cov=src/scitex_sh --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  import-smoke:
    name: import-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python
        run: uv python install 3.12
      - name: Install (no extras)
        run: uv pip install --system -e .
      - name: Import smoke
        run: python -c "import scitex_sh; print(scitex_sh.__version__)"

  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Set up Python
        run: uv python install 3.12
      - name: Install package + audit tooling
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system "scitex-dev[cli-audit]"
      - name: Run scitex-dev ecosystem audit-all
        run: scitex-dev ecosystem audit-all scitex-sh --no-version-check
